x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment:
    _PIP_ADDITIONAL_REQUIREMENTS: "mlflow xgboost scikit-learn python-dotenv evidently pyarrow fastparquet"
    PIP_DEFAULT_TIMEOUT: "1000"
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:root@postgres/casablanca_aq
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    PYTHONPATH: /opt/airflow/project
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./ml/mlruns:/opt/airflow/project/ml/mlruns
    - .:/opt/airflow/project
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - air_quality_net

services:

  postgres:
    image: postgres:15
    container_name: aq_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: casablanca_aq
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      retries: 5
    networks:
      - air_quality_net

  airflow-init:
    <<: *airflow-common
    container_name: aq_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Air \
          --lastname Quality \
          --role Admin \
          --email admin@casablanca.ma
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: aq_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: aq_airflow_scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  grafana:
    image: grafana/grafana:10.4.2
    container_name: aq_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - postgres
    networks:
      - air_quality_net
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:

networks:
  air_quality_net:
    driver: bridge